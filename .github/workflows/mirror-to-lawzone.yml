name: Mirror to lawzone-corporation

on:
  push:
    branches:
      - main
      - dev

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LAWZONE_SSH_KEY }}

      - name: Add lawzone remote & force push
        run: |
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add lawzone git@github.com:lawzone-corporation/techmeet-client.git
          git push lawzone ${{ github.ref_name }} --force
